<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inq — by HyzeLabs</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%2318899B' d='M50 5 L56.5 20.5 L73 18.5 L63.5 32 L70 47.5 L54.5 42.5 L50 58 L45.5 42.5 L30 47.5 L36.5 32 L27 18.5 L43.5 20.5 Z'/%3E%3Ccircle cx='50' cy='50' r='44' fill='none' stroke='%2318899B' stroke-width='5' stroke-dasharray='8 4'/%3E%3Ccircle cx='50' cy='50' r='36' fill='none' stroke='%2318899B' stroke-width='2' opacity='0.4'/%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root {
  --bg:        #0C1621;
  --bg2:       #0e1927;
  --sidebar:   #0a131d;
  --surface:   #111e2b;
  --surface2:  #152434;
  --surface3:  #1a2c3e;
  --border:    #1c2f42;
  --border2:   #213648;
  --teal:      #18899B;
  --teal-dim:  #126e7d;
  --teal-low:  rgba(24,137,155,0.13);
  --teal-lo2:  rgba(24,137,155,0.07);
  --text:      #ddeaf0;
  --text2:     #7a9aad;
  --text3:     #3d6070;
  --blue:      #3b82f6;
  --red:       #f87171;
  --red-low:   rgba(248,113,113,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;font-size:14px;}

/* ── AUTH ── */
#authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
#authScreen.hidden{display:none;}

.auth-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;animation:cardIn .4s cubic-bezier(.16,1,.3,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.auth-brand{display:flex;flex-direction:column;align-items:center;gap:10px;}
.auth-logo-icon{
  font-size:52px;color:var(--teal);
  text-shadow:0 0 40px rgba(24,137,155,.55),0 0 80px rgba(24,137,155,.2);
  animation:logoPulse 3s ease-in-out infinite;
  line-height:1;
}
@keyframes logoPulse{
  0%,100%{text-shadow:0 0 30px rgba(24,137,155,.4),0 0 70px rgba(24,137,155,.15);}
  50%{text-shadow:0 0 55px rgba(24,137,155,.65),0 0 110px rgba(24,137,155,.3);}
}
.auth-brand-name{font-family:'Lexend',sans-serif;font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.02em;}
.auth-tagline{font-size:12.5px;color:var(--text2);}
.hyze-inline .hw{font-family:'Lexend',sans-serif;font-weight:600;color:#fff;}
.hyze-inline .hb{font-family:'Lexend',sans-serif;font-weight:400;color:var(--blue);}

.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:28px;width:336px;display:flex;flex-direction:column;gap:15px;box-shadow:0 24px 60px rgba(0,0,0,.5);}

.auth-tabs{display:flex;background:var(--surface2);border-radius:9px;padding:3px;gap:3px;}
.auth-tab{flex:1;padding:7px;text-align:center;font-size:12.5px;font-weight:500;border-radius:7px;cursor:pointer;color:var(--text2);transition:all .2s;font-family:'Sora',sans-serif;border:none;background:transparent;}
.auth-tab.active{background:var(--surface3);color:var(--teal);}

.auth-form{display:flex;flex-direction:column;gap:11px;}
.auth-form.hidden{display:none;}
.field-lbl{font-size:10.5px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.auth-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'Sora',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s;}
.auth-input:focus{border-color:var(--teal-dim);box-shadow:0 0 0 3px rgba(24,137,155,.1);}
.auth-input::placeholder{color:var(--text3);}
.auth-btn{background:linear-gradient(135deg,#18899B,#0f6070);border:none;border-radius:9px;padding:10px;color:#e0f4f7;font-family:'Sora',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s;box-shadow:0 4px 16px rgba(24,137,155,.25);}
.auth-btn:hover{opacity:.9;transform:translateY(-1px);}
.auth-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.auth-error{font-size:12px;color:var(--red);min-height:14px;text-align:center;}
.auth-footer{text-align:center;font-size:11px;color:var(--text3);padding-top:4px;border-top:1px solid var(--border);}

/* ── APP ── */
#app{display:flex;height:100vh;width:100%;}
#app.hidden{display:none;}

/* SIDEBAR */
.sidebar{width:248px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 9px;gap:4px;flex-shrink:0;}
.sb-top{display:flex;gap:6px;margin-bottom:2px;}
.btn-new{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'Sora',sans-serif;font-size:12.5px;font-weight:500;padding:7px 11px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-new:hover{background:var(--surface3);}
.btn-new i{color:var(--teal);font-size:12px;}
.btn-ico{background:var(--surface2);border:1px solid var(--border2);border-radius:9px;color:var(--text2);width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.btn-ico:hover{background:var(--surface3);color:var(--text);}

.sb-lbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;margin-top:3px;}
.no-chats{font-size:12px;color:var(--text3);padding:5px 8px;}

.chat-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px;}
.chat-list::-webkit-scrollbar{width:3px;}
.chat-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.chat-item{
  padding:7px 9px;border-radius:8px;font-size:12.5px;color:var(--text2);
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:6px;
  position:relative;
}
.chat-item:hover{background:var(--surface2);color:var(--text);}
.chat-item.active{background:var(--teal-lo2);color:var(--teal);border-left:2px solid var(--teal);padding-left:7px;}
.chat-item-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.chat-item-actions{display:none;gap:2px;flex-shrink:0;}
.chat-item:hover .chat-item-actions,
.chat-item.active .chat-item-actions{display:flex;}
.ci-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:3px 5px;border-radius:5px;font-size:11px;transition:all .15s;display:flex;align-items:center;}
.ci-btn:hover{color:var(--text2);background:var(--surface3);}
.ci-btn.del:hover{color:var(--red);background:var(--red-low);}

/* RENAME INPUT */
.rename-input{
  flex:1;background:var(--surface3);border:1px solid var(--teal-dim);
  border-radius:5px;padding:2px 7px;color:var(--text);
  font-family:'Sora',sans-serif;font-size:12.5px;outline:none;min-width:0;
}

.sb-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:9px;display:flex;flex-direction:column;gap:3px;}
.hyze-badge{display:flex;align-items:center;justify-content:center;padding:5px 8px;gap:1px;}
.hyze-badge .hw{font-family:'Lexend',sans-serif;font-size:11.5px;font-weight:600;color:#fff;}
.hyze-badge .hb{font-family:'Lexend',sans-serif;font-size:11.5px;font-weight:400;color:var(--blue);}
.user-chip{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;}
.user-av{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#18899B,#0f6070);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#e0f4f7;flex-shrink:0;text-transform:uppercase;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-sub{font-size:10px;color:var(--text3);}
.signout-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:11.5px;font-family:'Sora',sans-serif;padding:6px 9px;border-radius:8px;text-align:left;transition:all .2s;display:flex;align-items:center;gap:6px;}
.signout-btn:hover{color:var(--red);background:var(--red-low);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-logo{display:flex;align-items:center;gap:8px;}
.tb-logo i{color:var(--teal);font-size:18px;text-shadow:0 0 14px rgba(24,137,155,.5);}
.tb-logo-text{font-family:'Lexend',sans-serif;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.02em;}
.tb-right{display:flex;gap:7px;}
.tb-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'Sora',sans-serif;font-size:12px;font-weight:500;padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;}
.tb-btn:hover{background:var(--surface3);color:var(--text);}

/* MESSAGES */
.msgs-area{flex:1;overflow-y:auto;padding:20px 0;scroll-behavior:smooth;}
.msgs-area::-webkit-scrollbar{width:4px;}
.msgs-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.msgs-inner{max-width:700px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:16px;}

/* WELCOME — fully centered */
.welcome-wrap{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;min-height:calc(100vh - 130px);
}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:20px;}
.w-icon{
  font-size:60px;color:var(--teal);line-height:1;
  text-shadow:0 0 50px rgba(24,137,155,.55),0 0 100px rgba(24,137,155,.2);
  animation:logoPulse 3s ease-in-out infinite;
}
.welcome h1{font-family:'Lexend',sans-serif;font-size:23px;font-weight:600;color:var(--text);letter-spacing:-.02em;}
.welcome p{font-size:13px;color:var(--text2);max-width:360px;line-height:1.65;}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:2px;}
.chip{background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:7px 14px;font-size:12.5px;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'Sora',sans-serif;}
.chip:hover{background:var(--teal-low);border-color:var(--teal-dim);color:var(--teal);}

/* MSG BUBBLES */
.msg{display:flex;gap:9px;animation:msgIn .25s ease-out;}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:13px;}
.msg.inq .msg-av{color:var(--teal);background:var(--teal-lo2);border:1px solid rgba(24,137,155,.2);text-shadow:0 0 10px rgba(24,137,155,.4);}
.msg.user .msg-av{background:var(--surface2);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;}
.msg-body{max-width:590px;}
.msg.user .msg-body{display:flex;flex-direction:column;align-items:flex-end;}
.bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.72;}
.msg.inq .bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.msg.user .bubble{background:var(--surface2);color:var(--text);border-bottom-right-radius:4px;border:1px solid var(--border2);}
.bubble strong{color:var(--teal);font-weight:600;}
.bubble em{color:var(--text2);}
.bubble code{background:rgba(24,137,155,.1);border-radius:4px;padding:2px 5px;font-size:12.5px;color:var(--teal);font-family:monospace;}
.bubble pre{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:11px;overflow-x:auto;margin:7px 0;}
.bubble pre code{background:none;color:var(--text2);padding:0;font-size:12.5px;}
.msg-actions{display:flex;gap:4px;margin-top:4px;opacity:0;transition:opacity .2s;}
.msg:hover .msg-actions{opacity:1;}
.act-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:3px 7px;border-radius:6px;font-size:11px;font-family:'Sora',sans-serif;display:flex;align-items:center;gap:4px;transition:all .2s;}
.act-btn:hover{color:var(--text2);background:var(--surface2);}

/* TYPING */
.typing-ind{display:flex;gap:4px;align-items:center;padding:11px 14px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--teal-dim);animation:dotB 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes dotB{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}

/* INPUT */
.input-area{padding:9px 20px 13px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:7px;}
.input-box{width:100%;max-width:700px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;display:flex;align-items:flex-end;gap:6px;padding:8px 9px;transition:border-color .2s,box-shadow .2s;}
.input-box:focus-within{border-color:var(--teal-dim);box-shadow:0 0 0 3px rgba(24,137,155,.08);}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;resize:none;min-height:22px;max-height:160px;line-height:1.5;padding:2px 0;}
textarea::placeholder{color:var(--text3);}
.in-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:5px;border-radius:7px;display:flex;align-items:center;transition:all .2s;flex-shrink:0;}
.in-btn:hover{color:var(--teal);background:var(--teal-lo2);}
.in-btn.active{color:var(--teal);}
.send-btn{width:30px;height:30px;background:linear-gradient(135deg,#18899B,#0f6070);border:none;border-radius:8px;color:#e0f4f7;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 2px 8px rgba(24,137,155,.25);}
.send-btn:hover{transform:scale(1.06);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.input-footer{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:7px;}
.model-tag{background:var(--teal-lo2);border:1px solid var(--border2);border-radius:100px;padding:2px 8px;font-size:10px;color:var(--teal);font-family:'Lexend',sans-serif;font-weight:500;}

/* VOICE */
.voice-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--teal-dim);border-radius:100px;padding:8px 18px;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 18px rgba(24,137,155,.12);z-index:100;animation:fadeUp .3s ease-out;}
.voice-bar.hidden{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.wvs{display:flex;gap:3px;align-items:center;height:16px;}
.wv{width:3px;background:var(--teal);border-radius:2px;animation:wvA .8s ease-in-out infinite;}
.wv:nth-child(1){height:4px}.wv:nth-child(2){height:10px;animation-delay:.1s}
.wv:nth-child(3){height:16px;animation-delay:.2s}.wv:nth-child(4){height:10px;animation-delay:.3s}
.wv:nth-child(5){height:4px;animation-delay:.4s}
@keyframes wvA{0%,100%{transform:scaleY(.5);opacity:.5}50%{transform:scaleY(1);opacity:1}}
.vstop{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:100px;color:var(--red);font-size:11px;font-weight:600;padding:3px 10px;cursor:pointer;font-family:'Sora',sans-serif;}

/* CONFIRM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:22px 24px;width:300px;display:flex;flex-direction:column;gap:14px;box-shadow:0 16px 48px rgba(0,0,0,.5);}
.modal h3{font-family:'Lexend',sans-serif;font-size:15px;font-weight:600;color:var(--text);}
.modal p{font-size:13px;color:var(--text2);line-height:1.5;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{padding:7px 16px;border-radius:8px;font-size:12.5px;font-family:'Sora',sans-serif;cursor:pointer;border:none;font-weight:500;}
.modal-btn.cancel{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.modal-btn.cancel:hover{background:var(--surface3);color:var(--text);}
.modal-btn.danger{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:var(--red);}
.modal-btn.danger:hover{background:rgba(248,113,113,.25);}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-wrap">
    <div class="auth-brand">
      <i class="fas fa-certificate auth-logo-icon"></i>
      <div class="auth-brand-name">Inq</div>
      <div class="auth-tagline">Your intelligent assistant, by
        <span class="hyze-inline"><span class="hw">Hyze</span><span class="hb">Labs</span></span>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSI" onclick="switchTab('signin')">Sign In</button>
        <button class="auth-tab" id="tabSU" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div class="auth-form" id="signinForm">
        <div><div class="field-lbl">Username</div><input class="auth-input" type="text" id="siUser" placeholder="Enter your username" autocomplete="username"/></div>
        <div><div class="field-lbl">Password</div><input class="auth-input" type="password" id="siPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()"/></div>
        <div class="auth-error" id="siErr"></div>
        <button class="auth-btn" id="siBtn" onclick="doSignIn()">Sign In</button>
      </div>

      <div class="auth-form hidden" id="signupForm">
        <div><div class="field-lbl">Username</div><input class="auth-input" type="text" id="suUser" placeholder="Choose a username" autocomplete="username"/></div>
        <div><div class="field-lbl">Password</div><input class="auth-input" type="password" id="suPass" placeholder="At least 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignUp()"/></div>
        <div class="auth-error" id="suErr"></div>
        <button class="auth-btn" id="suBtn" onclick="doSignUp()">Create Account</button>
      </div>

      <div class="auth-footer"><span class="hyze-inline"><span class="hw">Hyze</span><span class="hb">Labs</span></span></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="sb-top">
      <button class="btn-new" onclick="newChat()">
        <i class="fas fa-plus"></i> New Chat
      </button>
      <button class="btn-ico"><i class="fas fa-magnifying-glass" style="font-size:12px"></i></button>
    </div>

    <div class="sb-lbl">Chats</div>
    <div class="chat-list" id="chatList"><span class="no-chats">No chats yet</span></div>

    <div class="sb-bottom">
      <div class="hyze-badge"><span class="hw">Hyze</span><span class="hb">Labs</span></div>
      <div class="user-chip">
        <div class="user-av" id="userAv">?</div>
        <div class="user-info">
          <div class="user-name" id="userN">…</div>
          <div class="user-sub">Local account</div>
        </div>
      </div>
      <button class="signout-btn" onclick="doSignOut()">
        <i class="fas fa-right-from-bracket" style="font-size:11px"></i> Sign out
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="tb-left">
        <div class="tb-logo">
          <i class="fas fa-certificate tb-logo-i"></i>
          <span class="tb-logo-text">Inq</span>
        </div>
      </div>
      <div class="tb-right">
        <button class="tb-btn" onclick="newChat()">
          <i class="fas fa-plus" style="font-size:10px"></i> New
        </button>
      </div>
    </header>

    <div class="msgs-area" id="msgsArea">
      <div class="msgs-inner" id="msgsInner"></div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="msgInput" rows="1" placeholder="Ask Inq anything…"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="in-btn" id="micBtn" onclick="toggleVoice()" title="Voice input">
          <i class="fas fa-microphone" style="font-size:14px"></i>
        </button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <i class="fas fa-paper-plane" style="font-size:11px"></i>
        </button>
      </div>
      <div class="input-footer">
        <span class="model-tag">groq/compound</span>
        Inq can make mistakes. Verify important information.
      </div>
    </div>
  </main>
</div>

<!-- VOICE BAR -->
<div class="voice-bar hidden" id="voiceBar">
  <div class="wvs"><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div></div>
  <span>Listening…</span>
  <button class="vstop" onclick="stopVoice()">Stop</button>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay hidden" id="delModal">
  <div class="modal">
    <h3>Delete Chat</h3>
    <p>Are you sure you want to delete "<span id="delModalTitle"></span>"? This can't be undone.</p>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeDelModal()">Cancel</button>
      <button class="modal-btn danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://hyzelabsdev.vercel.app/api/chat';
const MODEL   = 'groq/compound';
const SYSTEM  = `You are Inq, a sharp and highly capable AI assistant created by HyzeLabs.
You are direct, knowledgeable, and precise. You help with coding, math, writing, research, and analysis.
Keep responses well-structured and appropriately concise — never pad with filler.
Use markdown where it aids clarity: code blocks for code, bold for key terms.
If you don't know something, say so honestly. Always be accurate.`;

const K_USERS   = 'inq_users';
const K_SESSION = 'inq_session';
function getUsers()    { return JSON.parse(localStorage.getItem(K_USERS)  || '{}'); }
function saveUsers(u)  { localStorage.setItem(K_USERS, JSON.stringify(u)); }
function getSession()  { return localStorage.getItem(K_SESSION); }
function setSession(u) { localStorage.setItem(K_SESSION, u); }
function clearSession(){ localStorage.removeItem(K_SESSION); }
function chatsKey(u)   { return `inq_chats_${u}`; }
function loadChatsLS(u){ return JSON.parse(localStorage.getItem(chatsKey(u)) || '{}'); }
function saveChatsLS(u,c){ localStorage.setItem(chatsKey(u), JSON.stringify(c)); }

let currentUser   = null;
let currentChatId = null;
let chats         = {};
let isLoading     = false;
let recognition   = null;
let isListening   = false;
let pendingDeleteId = null;
let renamingId    = null;

// ── BOOT ─────────────────────────────────────────────
(function init() {
  const saved = getSession();
  if (saved && getUsers()[saved]) { loginUser(saved); return; }
  showAuth();
})();

function showAuth() {
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

function loginUser(username) {
  currentUser = username;
  chats = loadChatsLS(username);
  document.getElementById('userN').textContent = username;
  document.getElementById('userAv').textContent = username[0].toUpperCase();
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  renderSidebar();
  const ids = Object.keys(chats).sort((a,b)=>(chats[b].ts||0)-(chats[a].ts||0));
  if (ids.length) { currentChatId = ids[0]; renderMessages(); }
  else newChat();
}

function switchTab(tab) {
  document.getElementById('tabSI').classList.toggle('active', tab==='signin');
  document.getElementById('tabSU').classList.toggle('active', tab==='signup');
  document.getElementById('signinForm').classList.toggle('hidden', tab!=='signin');
  document.getElementById('signupForm').classList.toggle('hidden', tab!=='signup');
}

function doSignIn() {
  const user = document.getElementById('siUser').value.trim();
  const pass = document.getElementById('siPass').value;
  const err  = document.getElementById('siErr');
  err.textContent = '';
  if (!user||!pass) { err.textContent='Please enter username and password.'; return; }
  const users = getUsers();
  if (!users[user]) { err.textContent='No account found with that username.'; return; }
  if (users[user].password !== btoa(pass)) { err.textContent='Incorrect password.'; return; }
  setSession(user); loginUser(user);
}

function doSignUp() {
  const user = document.getElementById('suUser').value.trim();
  const pass = document.getElementById('suPass').value;
  const err  = document.getElementById('suErr');
  err.textContent = '';
  if (!user||!pass) { err.textContent='Please fill in all fields.'; return; }
  if (user.length < 3) { err.textContent='Username must be at least 3 characters.'; return; }
  if (pass.length < 6) { err.textContent='Password must be at least 6 characters.'; return; }
  if (!/^[a-zA-Z0-9_]+$/.test(user)) { err.textContent='Letters, numbers, and underscores only.'; return; }
  const users = getUsers();
  if (users[user]) { err.textContent='That username is already taken.'; return; }
  users[user] = { password: btoa(pass), created: Date.now() };
  saveUsers(users); setSession(user); loginUser(user);
}

function doSignOut() {
  clearSession();
  currentUser=null; currentChatId=null; chats={};
  ['siUser','siPass'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('siErr').textContent='';
  showAuth();
}

// ── CHATS ─────────────────────────────────────────────
function newChat() {
  const id = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  chats[id] = { id, title:'New Chat', messages:[], ts:Date.now() };
  currentChatId = id;
  persist(); renderSidebar(); renderWelcome();
}

function persist() { if(currentUser) saveChatsLS(currentUser, chats); }
function loadChat(id) { currentChatId=id; renderSidebar(); renderMessages(); }

// ── RENAME ────────────────────────────────────────────
function startRename(e, id) {
  e.stopPropagation();
  renamingId = id;
  renderSidebar();
  // focus input after render
  setTimeout(() => {
    const inp = document.getElementById('rename-'+id);
    if (inp) { inp.focus(); inp.select(); }
  }, 30);
}

function commitRename(e, id) {
  if (e.type === 'keydown' && e.key !== 'Enter' && e.key !== 'Escape') return;
  if (e.key === 'Escape') { renamingId=null; renderSidebar(); return; }
  const inp = document.getElementById('rename-'+id);
  const val = inp ? inp.value.trim() : '';
  if (val) chats[id].title = val;
  renamingId = null;
  persist(); renderSidebar();
}

function blurRename(e, id) {
  const inp = document.getElementById('rename-'+id);
  const val = inp ? inp.value.trim() : '';
  if (val) chats[id].title = val;
  renamingId = null;
  persist(); renderSidebar();
}

// ── DELETE ────────────────────────────────────────────
function askDelete(e, id) {
  e.stopPropagation();
  pendingDeleteId = id;
  document.getElementById('delModalTitle').textContent = chats[id]?.title || 'this chat';
  document.getElementById('delModal').classList.remove('hidden');
}
function closeDelModal() {
  document.getElementById('delModal').classList.add('hidden');
  pendingDeleteId = null;
}
function confirmDelete() {
  if (!pendingDeleteId) return;
  delete chats[pendingDeleteId];
  if (currentChatId === pendingDeleteId) {
    const ids = Object.keys(chats).sort((a,b)=>(chats[b].ts||0)-(chats[a].ts||0));
    currentChatId = ids.length ? ids[0] : null;
  }
  closeDelModal(); persist(); renderSidebar();
  if (currentChatId) renderMessages();
  else newChat();
}

// ── RENDER SIDEBAR ────────────────────────────────────
function renderSidebar() {
  const el  = document.getElementById('chatList');
  const ids = Object.keys(chats).sort((a,b)=>(chats[b].ts||0)-(chats[a].ts||0));
  if (!ids.length) { el.innerHTML='<span class="no-chats">No chats yet</span>'; return; }
  el.innerHTML = ids.map(id => {
    const c   = chats[id];
    const act = id === currentChatId;
    if (renamingId === id) {
      return `<div class="chat-item ${act?'active':''}" style="gap:4px">
        <input class="rename-input" id="rename-${id}" value="${esc(c.title||'New Chat')}"
          onkeydown="commitRename(event,'${id}')"
          onblur="blurRename(event,'${id}')" onclick="event.stopPropagation()"/>
      </div>`;
    }
    return `<div class="chat-item ${act?'active':''}" onclick="loadChat('${id}')">
      <i class="fas fa-message chat-item-icon" style="font-size:10px;opacity:.35;flex-shrink:0"></i>
      <span class="chat-item-label">${esc(c.title||'New Chat')}</span>
      <div class="chat-item-actions">
        <button class="ci-btn" onclick="startRename(event,'${id}')" title="Rename"><i class="fas fa-pen" style="font-size:10px"></i></button>
        <button class="ci-btn del" onclick="askDelete(event,'${id}')" title="Delete"><i class="fas fa-trash" style="font-size:10px"></i></button>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER MESSAGES ───────────────────────────────────
function renderWelcome() {
  document.getElementById('msgsInner').innerHTML = `
    <div class="welcome-wrap">
      <div class="welcome">
        <i class="fas fa-certificate w-icon"></i>
        <h1>What can I help with?</h1>
        <p>Ask anything — code, math, research, writing.</p>
        <div class="chips">
          <span class="chip" onclick="sendChip('Explain quantum computing simply')">Explain quantum computing</span>
          <span class="chip" onclick="sendChip('Debug my JavaScript code')">Debug my code</span>
          <span class="chip" onclick="sendChip('Write a Python web scraper')">Write a Python scraper</span>
          <span class="chip" onclick="sendChip('Explain a concept I choose')">Explain a concept</span>
        </div>
      </div>
    </div>`;
}

function renderMessages() {
  const conv = chats[currentChatId];
  if (!conv || !conv.messages?.length) { renderWelcome(); return; }
  document.getElementById('msgsInner').innerHTML = conv.messages.map(renderMsg).join('');
  scrollBot();
}

function renderMsg(m) {
  const u = m.role === 'user';
  const av = u
    ? (currentUser?.[0]||'U').toUpperCase()
    : `<i class="fas fa-certificate"></i>`;
  const content = typeof m.content==='string'
    ? (u ? esc(m.content).replace(/\n/g,'<br>') : fmtAI(m.content))
    : esc('[message]');
  const acts = !u ? `<div class="msg-actions">
    <button class="act-btn" onclick="copyT(this)" data-t="${ea(m.content)}"><i class="fas fa-copy" style="font-size:10px"></i> Copy</button>
    <button class="act-btn" onclick="speakT(this)" data-t="${ea(m.content)}"><i class="fas fa-volume-high" style="font-size:10px"></i> Speak</button>
  </div>` : '';
  return `<div class="msg ${u?'user':'inq'}">
    <div class="msg-av">${av}</div>
    <div class="msg-body"><div class="bubble">${content}</div>${acts}</div>
  </div>`;
}

function fmtAI(t) {
  if (typeof t!=='string') return '';
  return t
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${esc(c.trim())}</code></pre>`)
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function scrollBot(){const a=document.getElementById('msgsArea');setTimeout(()=>a.scrollTop=a.scrollHeight,50);}

// ── SEND ──────────────────────────────────────────────
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px';}
function sendChip(t){document.getElementById('msgInput').value=t;sendMessage();}

async function sendMessage() {
  if (isLoading||!currentChatId) return;
  const inp = document.getElementById('msgInput');
  const txt = inp.value.trim();
  if (!txt) return;
  const conv = chats[currentChatId];
  conv.messages = conv.messages||[];
  conv.messages.push({role:'user',content:txt});
  if (conv.title==='New Chat') conv.title=txt.slice(0,50)+(txt.length>50?'…':'');
  conv.ts=Date.now();
  inp.value=''; inp.style.height='auto';
  persist(); renderSidebar(); renderMessages(); showTyping();
  isLoading=true; document.getElementById('sendBtn').disabled=true;
  try {
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:MODEL,
      messages:[{role:'system',content:SYSTEM},...conv.messages.map(m=>({role:m.role,content:m.content}))]
    })});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    hideTyping();
    const reply=data.choices?.[0]?.message?.content||data.content||JSON.stringify(data);
    conv.messages.push({role:'assistant',content:reply});
    conv.ts=Date.now();
    persist(); renderMessages(); renderSidebar();
  } catch(e) {
    hideTyping();
    conv.messages.push({role:'assistant',content:`Couldn't reach the server. (${e.message})`});
    persist(); renderMessages();
  } finally {
    isLoading=false; document.getElementById('sendBtn').disabled=false;
  }
}

function showTyping(){
  const i=document.getElementById('msgsInner');
  const el=document.createElement('div');
  el.className='msg inq'; el.id='typing';
  el.innerHTML=`<div class="msg-av"><i class="fas fa-certificate"></i></div>
  <div class="msg-body"><div class="bubble"><div class="typing-ind"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  i.appendChild(el); scrollBot();
}
function hideTyping(){const el=document.getElementById('typing');if(el)el.remove();}

// ── COPY ──────────────────────────────────────────────
function copyT(btn){
  navigator.clipboard.writeText(btn.dataset.t).then(()=>{
    btn.innerHTML='<i class="fas fa-check" style="font-size:10px"></i> Copied!';
    setTimeout(()=>btn.innerHTML='<i class="fas fa-copy" style="font-size:10px"></i> Copy',1500);
  });
}

// ── SPEAK ─────────────────────────────────────────────
let utt=null;
function speakT(btn){
  if(utt){speechSynthesis.cancel();utt=null;return;}
  utt=new SpeechSynthesisUtterance(btn.dataset.t);
  utt.rate=1.0; utt.pitch=1.0;
  const vs=speechSynthesis.getVoices();
  const v=vs.find(v=>/samantha|karen|google us english|ava/i.test(v.name))||vs.find(v=>v.lang.startsWith('en'));
  if(v) utt.voice=v;
  utt.onend=()=>utt=null;
  speechSynthesis.speak(utt);
}

// ── VOICE INPUT ───────────────────────────────────────
function toggleVoice(){
  if(isListening){stopVoice();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Speech recognition not supported.');return;}
  recognition=new SR();
  recognition.lang='en-US'; recognition.interimResults=false;
  recognition.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById('msgInput').value=t;autoResize(document.getElementById('msgInput'));};
  recognition.onend=stopVoice; recognition.onerror=stopVoice;
  recognition.start();
  isListening=true;
  document.getElementById('voiceBar').classList.remove('hidden');
  document.getElementById('micBtn').classList.add('active');
}
function stopVoice(){
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  isListening=false;
  document.getElementById('voiceBar').classList.add('hidden');
  document.getElementById('micBtn').classList.remove('active');
}
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=()=>{};
</script>
</body>
</html>
